<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zoe Face Debug</title>
  <style>
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      padding: 18px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 12px;
      background:
        radial-gradient(circle at 82% 18%, rgba(7, 0, 117, 0.35), transparent 36%),
        linear-gradient(135deg, #302f2f 0%, #171616 52%, #050044 100%);
      color: #f7f7ff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    header,
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }
    h1 { margin: 0; font-size: clamp(22px, 3vw, 34px); }
    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    button,
    select,
    label {
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font: inherit;
      font-weight: 750;
      padding: 8px 12px;
    }
    button { cursor: pointer; }
    select { color-scheme: dark; }
    label { display: inline-flex; gap: 8px; align-items: center; }
    .stage {
      position: relative;
      width: min(1100px, 100%);
      margin: 0 auto;
      min-height: 0;
      border: 2px solid rgba(109, 140, 255, 0.85);
      border-radius: 20px;
      overflow: hidden;
      background: #07070b;
    }
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    video { display: none; }
    canvas { pointer-events: none; }
    .status {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 10px 12px;
      min-height: 44px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.34);
      font-size: 14px;
      line-height: 1.35;
    }
    .status strong { color: #8effbd; }
  </style>
</head>
<body>
  <header>
    <div>
      <strong>Zoe</strong>
      <h1>Face Detector Debug</h1>
    </div>
    <div class="controls">
      <select id="model-select" aria-label="Face detector model">
        <option value="/models/blaze_face_short_range.tflite">Blaze short range</option>
      </select>
      <label><input id="mirror-toggle" type="checkbox" /> Mirror display</label>
      <label><input id="mirror-overlay-toggle" type="checkbox" /> Mirror overlay</label>
      <button id="restart-btn" type="button">Restart camera</button>
    </div>
  </header>

  <main class="stage">
    <video id="debug-video" autoplay playsinline muted></video>
    <canvas id="debug-overlay"></canvas>
  </main>

  <footer>
    <div id="debug-status" class="status">Starting...</div>
  </footer>

  <script type="module" src="face-debug.js"></script>
</body>
</html>
